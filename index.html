<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newstream</title>
<style>
:root {
  --primary-color: #007bff;
  --bg-black: #080808;
  --bg-card: #121212;
  --bg-item: #1a1a1a;
  --bg-hover: #222222;
  --text-main: #ffffff;
  --text-dim: #999999;
  --border-color: #1f1f1f;
  --slot-placeholder: #333;
}

[data-theme="light"] {
  --bg-black: #f0f2f5;
  --bg-card: #ffffff;
  --bg-item: #f8f9fa;
  --bg-hover: #e9ecef;
  --text-main: #1a1a1a;
  --text-dim: #6c757d;
  --border-color: #dee2e6;
  --slot-placeholder: #adb5bd;
}

body {
  margin: 0;
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-black);
  color: var(--text-main);
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 25px;
  background: var(--bg-black);
  border-bottom: 1px solid var(--border-color);
}

.logo {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-main);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo span { color: var(--primary-color); }

.container { display: flex; height: calc(100vh - 70px); }

.video-area-container {
  flex: 3;
  display: flex;
  flex-direction: column;
  padding: 15px;
  background: var(--bg-black);
  overflow-y: auto;
}

.video-grid { display: grid; gap: 15px; flex-grow: 1; }
.mode-1 { grid-template-columns: 1fr; }
.mode-2 { grid-template-columns: 1fr 1fr; }
.mode-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.mode-3 .video-slot:first-child { grid-column: span 2; }
.mode-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

.video-slot {
  background: #000;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
  border: 2px solid transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.video-slot.selected { border-color: var(--primary-color); }
.video-slot.hidden { display: none; }
iframe { width: 100%; height: 100%; border: none; }

.info-bar {
  margin-top: 15px;
  background: var(--bg-card);
  border-radius: 12px;
  padding: 15px;
  display: flex;
  align-items: center;
}

.live-badge {
  background: rgba(0, 123, 255, 0.15);
  color: var(--primary-color);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-right: 15px;
}

.sidebar {
  flex: 1;
  min-width: 350px;
  max-width: 400px;
  background: var(--bg-card);
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--border-color);
}

.search-box { padding: 15px 20px; }
.search-box input {
  width: 100%;
  background: var(--bg-item);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 10px 15px;
  color: var(--text-main);
  outline: none;
  box-sizing: border-box;
}

.category-title {
  padding: 10px 20px;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.channel-list { flex-grow: 1; overflow-y: auto; padding: 0 20px 20px 20px; }

.channel-item {
  background: var(--bg-item);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: 0.2s;
}
.channel-item:hover { background: var(--bg-hover); transform: translateX(5px); }

.channel-item img {
  width: 35px;
  height: 35px;
  object-fit: contain;
  background: #000;
  border-radius: 6px;
}
.channel-item-name { display: block; font-size: 14px; font-weight: 600; }
.channel-item-sub { font-size: 11px; color: var(--text-dim); }

.screen-switcher { display: flex; gap: 5px; padding: 0 25px; }
.s-btn {
  background: var(--bg-item);
  border: 1px solid var(--border-color);
  color: var(--text-dim);
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
}
.s-btn.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }

.theme-toggle { font-size: 20px; cursor: pointer; user-select: none; transition: transform 0.3s; }
.theme-toggle:hover { transform: scale(1.2); }
</style>
</head>
<body>

<header>
  <div class="logo"><span>▶</span> Newstream</div>
  <div class="screen-switcher">
    <button class="s-btn active" id="btn1" onclick="setGrid(1)">1</button>
    <button class="s-btn" id="btn2" onclick="setGrid(2)">2</button>
    <button class="s-btn" id="btn3" onclick="setGrid(3)">3</button>
    <button class="s-btn" id="btn4" onclick="setGrid(4)">4</button>
  </div>
  <div class="header-tools">
    <span class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️</span>
  </div>
</header>

<div class="container">
  <div class="video-area-container">
    <div class="video-grid mode-1" id="videoGrid">
      <div class="video-slot selected" id="slot1" onclick="selectSlot(1)"><div style="color:var(--slot-placeholder)">Ekran 1</div></div>
      <div class="video-slot hidden" id="slot2" onclick="selectSlot(2)"><div style="color:var(--slot-placeholder)">Ekran 2</div></div>
      <div class="video-slot hidden" id="slot3" onclick="selectSlot(3)"><div style="color:var(--slot-placeholder)">Ekran 3</div></div>
      <div class="video-slot hidden" id="slot4" onclick="selectSlot(4)"><div style="color:var(--slot-placeholder)">Ekran 4</div></div>
    </div>
    
    <div class="info-bar">
      <div class="live-badge"><span style="width:8px; height:8px; background:var(--primary-color); border-radius:50%"></span> CANLI YAYIN</div>
      <div>
        <span id="current-channel-title" style="font-weight: 700; font-size: 15px;">Kanal Seçiniz</span><br>
        <span id="current-channel-cat" style="color:var(--text-dim); font-size: 12px;">Kategori</span>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" onkeyup="filterChannels()" placeholder="Kanal ara...">
    </div>
    
    <div class="channel-list" id="kanallar-list">
      
      <div class="category-title">Spor Kanalları</div>
      <div class="channel-item" onclick="play('https://www.m3u8player.online/embed/m3u8?url=https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/bein-sports-1.m3u8', 'Bein Sports 1 (A)', 'Spor')">
        <img src="https://downloadr2.apkmirror.com/wp-content/uploads/2023/08/65/64d12cc185a4f_ptv.bein.ui.png">
        <div class="channel-item-info"><span class="channel-item-name">Bein Sports 1 (A)</span><span class="channel-item-sub">Spor • HD</span></div>
      </div>

      <div class="channel-item" onclick="play('https://www.m3u8player.online/embed/m3u8?url=https://maymunmatematigi.lol/static/bs1.m3u8', 'Bein Sports 1 (B)', 'Spor')">
        <img src="https://downloadr2.apkmirror.com/wp-content/uploads/2023/08/65/64d12cc185a4f_ptv.bein.ui.png">
        <div class="channel-item-info"><span class="channel-item-name">Bein Sports 1 (B)</span><span class="channel-item-sub">Spor • HD</span></div>
      </div>

      <div class="channel-item" onclick="play('https://www.m3u8player.online/embed/m3u8?url=https://noisy-cake-8ebc.travestigamzes.workers.dev/https://corestream.ronaldovurdu.help//hls/s-sport.m3u8', 'S Sport', 'Spor')">
        <img src="https://yt3.googleusercontent.com/gvJvmHjz_AD2oWOrKpMHrc6PkrPaf9ZJn714gU1hOYxOh7XWqLbSjwniRy9wXxs0R6vyIFsCivA=s900-c-k-c0x00ffffff-no-rj">
        <div class="channel-item-info"><span class="channel-item-name">S Sport</span><span class="channel-item-sub">Spor • HD</span></div>
      </div>

      <div class="channel-item" onclick="play('https://www.m3u8player.online/embed/m3u8?url=https://hlsssssss.ercansov.workers.dev/https://corestream.ronaldovurdu.help//hls/exxen1.m3u8', 'Exxenspor 1', 'Spor')">
        <img src="https://yt3.ggpht.com/UJrEza5owqpIQSdFredj9UqwNvPTEs1rLhfaf8lOxrojMcmM0QVrGm1dAl6bLv1We-3uC7Nq_g=s176-c-k-c0x00ffffff-no-rj-mo">
        <div class="channel-item-info"><span class="channel-item-name">Exxenspor 1</span><span class="channel-item-sub">Spor • CANLI</span></div>
      </div>

      <div class="category-title">Ulusal Kanallar</div>
      <div class="channel-item" onclick="play('https://www.m3u8player.online/embed/m3u8?url=https://rkhubpaomb.turknet.ercdn.net/fwjkgpasof/tv8bucuk/tv8bucuk_720p.m3u8', 'TV 8.5', 'Ulusal')">
        <img src="https://canlitv.com/resimler/blog/tv85-frekans-bilgisi.jpg">
        <div class="channel-item-info"><span class="channel-item-name">TV 8.5</span><span class="channel-item-sub">Ulusal • HD</span></div>
      </div>

    </div>
  </div>
</div>

<script>
let currentSlotId = 1;

function toggleTheme() {
  const body = document.body;
  const themeBtn = document.getElementById('themeBtn');
  if (body.getAttribute('data-theme') === 'light') {
    body.removeAttribute('data-theme');
    themeBtn.innerText = '☀️';
  } else {
    body.setAttribute('data-theme', 'light');
    themeBtn.innerText = '🌙';
  }
}

function setGrid(num) {
  const grid = document.getElementById('videoGrid');
  grid.className = 'video-grid mode-' + num;
  for(let i=1; i<=4; i++) {
    const slot = document.getElementById('slot' + i);
    if(i <= num) { 
      slot.classList.remove('hidden'); 
    } else { 
      slot.classList.add('hidden'); 
      slot.innerHTML = `<div style="color:var(--slot-placeholder)">Ekran ${i}</div>`; 
    }
  }
  document.querySelectorAll('.s-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn' + num).classList.add('active');
}

function selectSlot(id) {
  currentSlotId = id;
  document.querySelectorAll('.video-slot').forEach(slot => slot.classList.remove('selected'));
  document.getElementById('slot' + id).classList.add('selected');
}

function play(url, name, cat) {
  const targetSlot = document.getElementById('slot' + currentSlotId);
  targetSlot.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
  document.getElementById('current-channel-title').innerText = name;
  document.getElementById('current-channel-cat').innerText = cat + " • HD";
}

function filterChannels() {
  let input = document.getElementById('searchInput').value.toLowerCase();
  let channels = document.getElementsByClassName('channel-item');
  let cats = document.getElementsByClassName('category-title');
  
  for (let i = 0; i < channels.length; i++) {
    let name = channels[i].querySelector('.channel-item-name').innerText.toLowerCase();
    channels[i].style.display = name.includes(input) ? "flex" : "none";
  }
  // Arama yapılırken kategori başlıklarını gizle
  for (let i = 0; i < cats.length; i++) {
    cats[i].style.display = input === "" ? "block" : "none";
  }
}
</script>
</body>
</html>
