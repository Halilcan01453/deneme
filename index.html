<meta charset="UTF-8">

<style>
:root {
  --primary-color: #4caf50;
  --bg-dark: #0b0c0d;
  --bg-card: #151617;
  --bg-hover: #1c1e1f;
  --text-main: #eee;
  --text-dim: #777;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-dark);
  color: #fff;
  overflow-x: hidden;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: #111;
  border-bottom: 1px solid #222;
  position: sticky;
  top: 0;
  z-index: 100;
}

header h1 {
  margin: 0;
  font-size: 20px;
  color: var(--primary-color);
  display: flex;
  align-items: center;
  gap: 10px;
}

.screen-controls { display: flex; gap: 5px; }

.screen-btn {
  background: #222;
  border: 1px solid #333;
  color: #ccc;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  transition: 0.2s;
}

.screen-btn.active {
  background: var(--primary-color);
  color: #000;
  font-weight: bold;
}

.container {
  display: flex;
  flex-direction: row;
  height: calc(100vh - 55px);
}

.video-area {
  flex: 3;
  background: #000;
  padding: 10px;
  display: grid;
  gap: 10px;
}

/* Onarılmış Grid Modları */
.mode-1 { grid-template-columns: 1fr; }
.mode-2 { grid-template-columns: 1fr 1fr; }
.mode-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.mode-3 .video-slot:first-child { grid-column: span 2; }
.mode-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }

.video-slot {
  width: 100%;
  height: 100%;
  background: #111;
  border-radius: 8px;
  border: 2px solid transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  cursor: pointer;
}

.video-slot.selected { border-color: #2196F3; box-shadow: 0 0 15px rgba(33, 150, 243, 0.3); }
.video-slot.hidden { display: none; }

iframe { width: 100%; height: 100%; border: none; }

.sidebar {
  flex: 1;
  min-width: 320px;
  max-width: 400px;
  padding: 15px;
  overflow-y: auto;
  background: var(--bg-dark);
  border-left: 1px solid #222;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #222;
  background: #111;
  color: #fff;
  margin-bottom: 15px;
  box-sizing: border-box;
  outline: none;
}

.channel-list-header {
    padding: 10px 0;
    font-size: 14px;
    font-weight: bold;
    color: var(--primary-color);
    border-bottom: 1px solid #222;
    margin-bottom: 15px;
}

.channel {
  background: var(--bg-card);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  cursor: pointer;
  transition: 0.2s;
}

.channel:hover { background: var(--bg-hover); }

.channel img {
  width: 40px;
  height: 40px;
  border-radius: 6px;
  margin-right: 12px;
  object-fit: contain;
  background: #000;
}

.channel-info { flex-grow: 1; display: flex; flex-direction: column; }
.channel-name { font-size: 14px; font-weight: 600; }
.channel-category { font-size: 11px; color: var(--text-dim); }
.badge { background: #222; color: #999; padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }

@media (max-width: 992px) {
  .container { flex-direction: column; height: auto; }
  .video-area { height: 350px; position: sticky; top: 50px; z-index: 90; }
  .sidebar { max-width: 100%; min-width: 100%; }
}

.sidebar::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
</style>
</head>

<script>
let currentSlotId = 1;

function setGrid(num) {
  const grid = document.getElementById('videoGrid');
  // Grid sınıfını değiştir
  grid.className = 'video-area mode-' + num;
  
  // Slotları göster/gizle
  for(let i=1; i<=4; i++) {
    const slot = document.getElementById('slot' + i);
    if(i <= num) {
      slot.classList.remove('hidden');
    } else {
      slot.classList.add('hidden');
      // Gizlenen slotun içindeki iframe'i temizle (ses karışmasın)
      slot.innerHTML = `<div style="text-align:center; color:#555">📺 Ekran ${i}</div>`;
    }
  }

  // Buton aktiflik durumunu güncelle
  document.querySelectorAll('.screen-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn' + num).classList.add('active');

  // Eğer seçili ekran gizlendiyse, 1. ekranı seç
  if (currentSlotId > num) selectSlot(1);
}

function selectSlot(id) {
  currentSlotId = id;
  document.querySelectorAll('.video-slot').forEach(slot => slot.classList.remove('selected'));
  document.getElementById('slot' + id).classList.add('selected');
}

function play(url) {
  const targetSlot = document.getElementById('slot' + currentSlotId);
  targetSlot.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
  if(window.innerWidth <= 992) { window.scrollTo({top: 0, behavior: 'smooth'}); }
}

function filterChannels() {
  let input = document.getElementById('searchInput').value.toLowerCase();
  let channels = document.getElementById('kanallar-list').getElementsByClassName('channel');
  for (let i = 0; i < channels.length; i++) {
    let name = channels[i].querySelector('.channel-name').innerText.toLowerCase();
    channels[i].style.display = name.includes(input) ? "flex" : "none";
  }
}
</script>
